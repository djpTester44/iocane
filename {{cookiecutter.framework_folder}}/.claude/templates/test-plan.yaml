# Test plan -- per-component behavioral invariants
# Schema: .claude/scripts/schemas.py (TestPlanFile, TestPlanEntry, TestInvariant)
# Hook: .claude/hooks/validate-yaml.sh routes plans/test-plan.yaml
# Writer: .claude/scripts/test_plan_parser.py (authored by /io-architect)
# Reference: .claude/references/test-plan-schema.md
#
# entries is a component-keyed dict (mirrors component-contracts.yaml's
# components dict). Each entry covers one component's behavioral
# commitments. The optional TestInvariant.method anchors an invariant
# to a specific method scope -- the architect supplies it from impl
# knowledge when an error_propagation invariant covers a particular
# component-level raises entry.

entries: {}

# Example:
# entries:
#   Router:
#     component: Router
#     invariants:
#       - id: INV-001
#         kind: error_propagation
#         description: Raises RouteNotFound when the destination is absent
#         pass_criteria: |
#           Given a destination not present in the routing table, route()
#           raises RouteNotFound with the destination in the message.
#         method: route
#
#       - id: INV-002
#         kind: call_binding
#         description: Delegates geocoding to the injected Geocoder
#         pass_criteria: |
#           Geocoder.lookup is called exactly once with the destination
#           from the route request. No other collaborator is touched on
#           the happy path.
#
#       - id: INV-003
#         kind: cardinality
#         description: Persists one route row per successful resolution
#         pass_criteria: |
#           For a successful route(), RouteRepository.save is called
#           exactly once. No duplicate writes on retries.
#
#       - id: INV-004
#         kind: state_transition
#         description: RouteStatus transitions PENDING -> RESOLVED on success
#         pass_criteria: |
#           Before route() runs, status is PENDING; after a successful
#           return, status is RESOLVED. FAILED is only set on error
#           paths, never skipped.
#
#       - id: INV-005
#         kind: property
#         description: Route resolution is deterministic for the same inputs
#         pass_criteria: |
#           Property test: for any (src, dst) present in the table, two
#           successive route() calls with the same args return structurally
#           equal RoutePayload values.
#
#       - id: INV-006
#         kind: adversarial
#         description: Rejects coordinate payloads outside the declared bbox
#         pass_criteria: |
#           Given coords outside the configured geofence, route() raises
#           ValueError rather than returning a partial RoutePayload.

# L0 catalog kind enums -- harness-shipped defaults.
#
# Each category lists the allowed `kind` string values for entries in
# `<project>/catalog.toml`. Projects extend this set additively via
# `<project>/catalog-kinds.local.toml` (gitignored optional file) for
# unusual domains the harness defaults don't cover. The parser merges
# defaults + project extensions; the merged set is the validation set.
#
# Schema owner: .claude/scripts/schemas.py (CatalogKindsFile)
# Parser:       .claude/scripts/catalog_parser.py
# Consumer:     validate_crc_budget.py (typed <category>.<entry_name>
#               citation distinct count enforcing MAX_DOMAIN_CONCERNS)
#
# Editing this file modifies harness defaults for every consumer
# project. To add a kind for ONE project only, edit
# `<project>/catalog-kinds.local.toml` instead.

